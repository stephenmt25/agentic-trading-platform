name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ------------------------------------------------------------------
  # Python linting: black, isort, ruff, mypy
  # ------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install black isort ruff mypy

      - name: Run black (check mode)
        run: black --check .

      - name: Run isort (check mode)
        run: isort --check-only .

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy --ignore-missing-imports services/ libs/

  # ------------------------------------------------------------------
  # Unit tests
  # ------------------------------------------------------------------
  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==1.7.0

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run unit tests
        run: poetry run pytest tests/unit -v --tb=short --junitxml=reports/unit-results.xml
        env:
          AION_REDIS_URL: redis://localhost:6379/1
          AION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aion_test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: reports/unit-results.xml

  # ------------------------------------------------------------------
  # Integration tests (with Docker services)
  # ------------------------------------------------------------------
  test-integration:
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      timescaledb:
        image: timescale/timescaledb:2.13.1-pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aion_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==1.7.0

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run integration tests
        run: poetry run pytest tests/integration -v --tb=short --junitxml=reports/integration-results.xml
        env:
          AION_REDIS_URL: redis://localhost:6380/1
          AION_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/aion_test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: reports/integration-results.xml

  # ------------------------------------------------------------------
  # Security scanning: safety + bandit
  # ------------------------------------------------------------------
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install safety bandit

      - name: Run safety check (dependency vulnerabilities)
        run: safety check --full-report || true

      - name: Run bandit (static security analysis)
        run: bandit -r services/ libs/ -f json -o reports/bandit-report.json --severity-level medium || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: reports/bandit-report.json

  # ------------------------------------------------------------------
  # Frontend linting: eslint + TypeScript check
  # ------------------------------------------------------------------
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --max-warnings 0

      - name: Run TypeScript check
        run: npx tsc --noEmit

  # ------------------------------------------------------------------
  # Docker build (validates all images build successfully)
  # ------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-unit, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/base.Dockerfile
          push: false
          tags: aion-trading/base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
