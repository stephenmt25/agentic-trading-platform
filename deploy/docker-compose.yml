services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-changeme_redis_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - internal
      - external

  timescaledb:
    image: timescale/timescaledb:2.13.1-pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: praxis_trading
    volumes:
      - timescale_data:/var/lib/postgresql/data
      # migrations get applied via script later or by custom PG init
      # - ../migrations/versions:/docker-entrypoint-initdb.d/
    ports:
      - "5432:5432"
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d praxis_trading"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal
      - external

  # Agent services will be added here progressively

volumes:
  redis_data:
  timescale_data:

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
