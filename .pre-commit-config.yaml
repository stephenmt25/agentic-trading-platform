# Pre-commit hooks — mirror the CI blocking gates (.github/workflows/ci.yml
# `lint` + `guards` jobs) so failures are caught locally before commit, not in CI.
#
#   Install once:   pip install pre-commit && pre-commit install
#   Run on all:     pre-commit run --all-files
#
# Tool versions are pinned to match pyproject.toml dev deps and CI exactly.
# When you bump a tool in pyproject.toml, bump it here in the same commit.
minimum_pre_commit_version: "3.5.0"

repos:
  # --- general hygiene (cheap, non-Python-specific) ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=1024"] # block accidental tarballs/binaries (e.g. aion-trading.tar.gz)

  # --- black (matches pyproject [tool.black]: line-length 88, py311) ---
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 24.2.0
    hooks:
      - id: black
        language_version: python3.11

  # --- isort (matches [tool.isort]: profile=black, line_length 88) ---
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort

  # --- ruff (matches [tool.ruff]: line-length 88, py311) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.2
    hooks:
      - id: ruff

  # --- domain guards (mirrors the CI `guards` job exactly) ---
  # Float gate (no float( in services/{execution,pnl,risk,strategy} without
  # '# float-ok') + Redis channel contract (stream:/pubsub: literals must be
  # declared in libs/messaging/channels.py). AST-based, stdlib only, fast.
  - repo: local
    hooks:
      - id: praxis-guards
        name: float() / Redis-channel guards (mirrors CI guards job)
        entry: python scripts/ci/guards.py
        language: system
        pass_filenames: false
        always_run: true

  # --- mypy (BLOCKING since 2026-06-13 — W2-2 drove the baseline to zero) ---
  # Mirrors the now-blocking CI mypy gate exactly (same command, same pragmatic
  # profile from pyproject.toml). Runs via poetry so hook and CI share versions.
  - repo: local
    hooks:
      - id: praxis-mypy
        name: mypy (mirrors CI lint job)
        entry: poetry run mypy --ignore-missing-imports services/ libs/
        language: system
        types: [python]
        pass_filenames: false

  # --- skill-drift guard (mirrors the CI guards job step) ---
  - repo: local
    hooks:
      - id: praxis-skill-drift
        name: prompt skill-bundle drift guard
        entry: python scripts/ci/check_skill_drift.py
        language: system
        pass_filenames: false
        always_run: true
