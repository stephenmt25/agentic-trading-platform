# Pre-commit hooks — mirror the CI lint gates (.github/workflows/ci.yml `lint` job)
# so style/type failures are caught locally before commit, not in CI.
#
#   Install once:   pip install pre-commit && pre-commit install
#   Run on all:     pre-commit run --all-files
#
# Tool versions are pinned to match pyproject.toml dev deps and CI exactly.
# When you bump a tool in pyproject.toml, bump it here in the same commit.
minimum_pre_commit_version: "3.5.0"

repos:
  # --- general hygiene (cheap, non-Python-specific) ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=1024"] # block accidental tarballs/binaries (e.g. aion-trading.tar.gz)

  # --- black (matches pyproject [tool.black]: line-length 88, py311) ---
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 24.2.0
    hooks:
      - id: black
        language_version: python3.11

  # --- isort (matches [tool.isort]: profile=black, line_length 88) ---
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort

  # --- ruff (matches [tool.ruff]: line-length 88, py311) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.2
    hooks:
      - id: ruff

  # --- mypy (matches [tool.mypy]: strict, py311; CI scopes to services/ + libs/) ---
  # CI runs: mypy --ignore-missing-imports services/ libs/
  # Strict config is read from pyproject.toml. Scoped to the same paths so the
  # local result matches the CI result.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports"]
        files: ^(services|libs)/.*\.py$
